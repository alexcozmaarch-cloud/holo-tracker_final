<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>HOLO TRACKER</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0b0f;--bg2:#111318;--bg3:#1a1d26;--border:#232632;
  --text:#e8e9f0;--muted:#5a5d72;
  --gold:#c8aa3c;--cyan:#4db6d1;
  --hot:#e05a2b;--warm:#c8aa3c;--watch:#4d82c8;--cold:#5a5d72;--buydip:#39c88a;
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh}

/* ── SETUP BANNER ── */
#setup-banner{background:var(--bg2);border-bottom:1px solid var(--border);padding:14px 32px;display:flex;gap:12px;align-items:center;flex-wrap:wrap}
#setup-banner.hidden{display:none}
.setup-label{font-size:0.72rem;font-family:'DM Mono',monospace;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;white-space:nowrap}
#url-input{flex:1;min-width:240px;background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:8px 12px;color:var(--text);font-family:'DM Mono',monospace;font-size:0.75rem;outline:none}
#url-input:focus{border-color:#3a3d52}
#url-input::placeholder{color:var(--muted)}
.btn-connect{background:var(--gold);color:#000;border:none;border-radius:7px;padding:8px 16px;font-family:'DM Mono',monospace;font-size:0.72rem;font-weight:500;text-transform:uppercase;letter-spacing:0.08em;cursor:pointer;white-space:nowrap}
.btn-connect:active{opacity:0.8}
#sync-status{font-size:0.68rem;font-family:'DM Mono',monospace;color:var(--muted);display:flex;align-items:center;gap:6px;white-space:nowrap}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--muted);flex-shrink:0}
.sync-dot.ok{background:var(--buydip)}
.sync-dot.err{background:var(--hot)}
.sync-dot.busy{background:var(--gold);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

/* ── HEADER ── */
.header{padding:24px 32px 0;display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap}
.logo{font-family:'Bebas Neue',sans-serif;font-size:2.8rem;letter-spacing:0.12em;background:linear-gradient(135deg,var(--gold),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}
.header-meta{font-size:0.7rem;font-family:'DM Mono',monospace;color:var(--muted);text-transform:uppercase;letter-spacing:0.07em;margin-top:2px}
.portfolio-val{text-align:right}
.portfolio-val-label{font-size:0.68rem;font-family:'DM Mono',monospace;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:2px}
.portfolio-val-num{font-size:1.8rem;font-weight:600;color:var(--gold)}

/* ── STATS ── */
.stats{display:flex;gap:10px;padding:16px 32px;flex-wrap:wrap}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;min-width:90px}
.stat-label{font-size:0.62rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);font-family:'DM Mono',monospace;margin-bottom:3px}
.stat-val{font-size:1.25rem;font-weight:600}

/* ── QUICK ADD ── */
.quick-add{padding:0 32px 14px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.quick-add-label{font-size:0.65rem;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);white-space:nowrap}
.quick-wrap{position:relative;flex:1;max-width:340px}
.quick-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);opacity:0.35;width:15px;height:15px;pointer-events:none}
#quick-input{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:9px 10px 9px 32px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.85rem;outline:none}
#quick-input:focus{border-color:var(--gold)}
#quick-input::placeholder{color:var(--muted)}
.quick-dropdown{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--bg2);border:1px solid var(--border);border-radius:8px;z-index:50;max-height:260px;overflow-y:auto;display:none}
.quick-dropdown.open{display:block}
.qd-item{padding:9px 12px;display:flex;align-items:center;gap:10px;cursor:pointer;border-bottom:1px solid var(--border)}
.qd-item:last-child{border-bottom:none}
.qd-item:hover,.qd-item.focused{background:var(--bg3)}
.qd-name{font-size:0.82rem;font-weight:500;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.qd-set{font-size:0.65rem;font-family:'DM Mono',monospace;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;white-space:nowrap}
.qd-badge{font-size:0.58rem;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:0.08em;padding:2px 6px;border-radius:3px;white-space:nowrap}
.qd-mentions{font-size:0.65rem;font-family:'DM Mono',monospace;color:var(--muted);white-space:nowrap}
.qd-empty{padding:14px 12px;font-size:0.78rem;color:var(--muted);text-align:center;font-family:'DM Mono',monospace}
.qd-new{padding:9px 12px;cursor:pointer;border-top:1px solid var(--border);background:rgba(57,200,138,0.05)}
.qd-new:hover{background:rgba(57,200,138,0.12)}
.qd-new-label{font-size:0.78rem;color:var(--buydip);font-family:'DM Mono',monospace}

/* ── TOAST ── */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px 20px;font-size:0.8rem;font-family:'DM Mono',monospace;color:var(--text);z-index:200;opacity:0;transition:opacity 0.2s,transform 0.2s;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.success{border-color:var(--buydip);color:var(--buydip)}
#toast.error{border-color:var(--hot);color:var(--hot)}

/* ── ADD NEW MODAL ── */
#new-card-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:150;align-items:center;justify-content:center}
#new-card-modal.open{display:flex}
.ncm-box{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:24px;width:min(420px,92vw)}
.ncm-title{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:0.1em;color:var(--gold);margin-bottom:16px}
.ncm-field{margin-bottom:12px}
.ncm-field label{display:block;font-size:0.65rem;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);margin-bottom:5px}
.ncm-field input,.ncm-field select{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:9px 12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.85rem;outline:none}
.ncm-field input:focus,.ncm-field select:focus{border-color:var(--gold)}
.ncm-field select option{background:var(--bg2)}
.ncm-row{display:flex;gap:8px}
.ncm-row .ncm-field{flex:1}
.ncm-actions{display:flex;gap:8px;margin-top:4px}
.btn-ncm-add{flex:1;background:var(--buydip);color:#000;border:none;border-radius:8px;padding:10px;font-family:'DM Mono',monospace;font-size:0.78rem;font-weight:500;text-transform:uppercase;letter-spacing:0.08em;cursor:pointer}
.btn-ncm-add:active{opacity:0.8}
.btn-ncm-cancel{background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:8px;padding:10px 16px;font-family:'DM Mono',monospace;font-size:0.78rem;cursor:pointer}

/* ── CONTROLS ── */
.controls{padding:0 32px 12px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.search-wrap{position:relative;flex:1;min-width:180px;max-width:360px}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);opacity:0.35;width:15px;height:15px}
#search{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:8px 10px 8px 30px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.82rem;outline:none}
#search:focus{border-color:#3a3d52}
#search::placeholder{color:var(--muted)}
.tabs{display:flex;gap:3px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:3px}
.tab{padding:5px 10px;border-radius:5px;font-size:0.68rem;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:0.07em;cursor:pointer;border:none;background:transparent;color:var(--muted);transition:all 0.12s}
.tab.active{background:var(--bg3);color:var(--text)}
.tab[data-sig="hot"].active{color:var(--hot)}
.tab[data-sig="warm"].active{color:var(--warm)}
.tab[data-sig="watch"].active{color:var(--watch)}
.tab[data-sig="buydip"].active{color:var(--buydip)}
.tab[data-sig="cold"].active{color:var(--cold)}
select#sort{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:7px 10px;color:var(--text);font-family:'DM Mono',monospace;font-size:0.72rem;outline:none;cursor:pointer}

/* ── GRID ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:12px;padding:0 32px 48px}
.result-count{padding:0 32px 8px;font-size:0.68rem;font-family:'DM Mono',monospace;color:var(--muted);text-transform:uppercase;letter-spacing:0.07em}

/* ── CARD ── */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:transform 0.12s,border-color 0.12s;position:relative}
.card:hover{transform:translateY(-2px);border-color:#3a3d52}
.card.sig-hot{border-top:2px solid var(--hot)}
.card.sig-warm{border-top:2px solid var(--warm)}
.card.sig-buydip{border-top:2px solid var(--buydip)}
.card.sig-watch{border-top:2px solid var(--watch)}
.card.sig-cold{border-top:2px solid var(--cold)}

/* +1 MENTION BUTTON on card */
.card-mention-btn{position:absolute;top:8px;right:8px;width:30px;height:30px;border-radius:50%;background:rgba(10,11,15,0.75);border:1px solid var(--border);color:var(--text);font-size:1rem;display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0;transition:opacity 0.15s,transform 0.1s;z-index:10;line-height:1}
.card:hover .card-mention-btn{opacity:1}
.card-mention-btn:hover{background:var(--buydip);border-color:var(--buydip);color:#000;transform:scale(1.1)}
.card-mention-btn:active{transform:scale(0.95)}
/* bump animation */
@keyframes bump{0%{transform:scale(1)}40%{transform:scale(1.35)}100%{transform:scale(1)}}
.card-mention-btn.bumped{animation:bump 0.3s ease-out}

.card-img-wrap{background:var(--bg3);position:relative}
.card-img-wrap img{width:100%;display:none}
.img-ph{width:100%;aspect-ratio:5/7;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;background:linear-gradient(160deg,var(--bg3) 60%,var(--border))}
.img-ph-icon{font-size:1.8rem;opacity:0.12}
.img-ph-txt{font-size:0.58rem;font-family:'DM Mono',monospace;color:var(--muted);opacity:0.5;text-transform:uppercase;letter-spacing:0.1em}

.card-body{padding:9px 11px 11px}
.card-name{font-size:0.8rem;font-weight:600;color:var(--text);margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-set{font-size:0.64rem;font-family:'DM Mono',monospace;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:7px}
.card-prices{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:5px}
.card-price-chf{font-size:0.95rem;font-weight:600;color:var(--text)}
.card-price-eur{font-size:0.68rem;font-family:'DM Mono',monospace;color:var(--muted)}
.card-footer{display:flex;justify-content:space-between;align-items:center}
.badge{font-size:0.58rem;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:0.09em;padding:2px 6px;border-radius:3px;font-weight:500}
.badge-hot{background:rgba(224,90,43,0.15);color:var(--hot)}
.badge-warm{background:rgba(200,170,60,0.15);color:var(--warm)}
.badge-buydip{background:rgba(57,200,138,0.15);color:var(--buydip)}
.badge-watch{background:rgba(77,130,200,0.15);color:var(--watch)}
.badge-cold{background:rgba(90,93,114,0.15);color:var(--cold)}
.mentions{font-size:0.65rem;font-family:'DM Mono',monospace;color:var(--muted)}
.card-note{font-size:0.65rem;color:var(--muted);margin-top:4px;font-style:italic;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* pending flash */
@keyframes flash{0%{background:rgba(57,200,138,0.12)}100%{background:transparent}}
.card.pending-sync{animation:flash 1.5s ease-out}

/* ── DETAIL MODAL ── */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:100;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:16px;width:min(520px,95vw);max-height:90vh;overflow-y:auto;position:relative}
.modal-close{position:absolute;top:12px;right:12px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--muted);padding:4px 10px;cursor:pointer;font-size:0.78rem}
.modal-inner{display:flex;gap:0}
.modal-img{width:190px;min-width:190px;border-radius:16px 0 0 16px;overflow:hidden;background:var(--bg3)}
.modal-img img{width:100%;display:none}
.modal-img .img-ph{aspect-ratio:3/4}
.modal-details{padding:22px;flex:1}
.modal-name{font-size:1.15rem;font-weight:600;margin-bottom:3px}
.modal-set{font-size:0.68rem;font-family:'DM Mono',monospace;color:var(--muted);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:18px}
.modal-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:0.82rem}
.modal-row:last-of-type{border-bottom:none}
.modal-row-label{color:var(--muted)}
/* +1 button in modal */
.btn-modal-mention{width:100%;margin-top:16px;background:transparent;border:1px solid var(--border);border-radius:8px;padding:10px;font-family:'DM Mono',monospace;font-size:0.75rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--text);cursor:pointer;transition:background 0.12s,border-color 0.12s}
.btn-modal-mention:hover{background:rgba(57,200,138,0.1);border-color:var(--buydip);color:var(--buydip)}
.btn-modal-mention:active{transform:scale(0.98)}
.modal-links{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.modal-link{font-size:0.68rem;font-family:'DM Mono',monospace;color:var(--muted);text-decoration:none;border:1px solid var(--border);border-radius:6px;padding:4px 9px}
.modal-link:hover{color:var(--text);border-color:#3a3d52}

/* ── EMPTY ── */
.empty{padding:60px 32px;text-align:center;color:var(--muted);font-size:0.88rem}

/* ── PENDING QUEUE INDICATOR ── */
#queue-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(10,11,15,0.95);border-top:1px solid var(--border);padding:10px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;transform:translateY(100%);transition:transform 0.25s;z-index:90}
#queue-bar.show{transform:translateY(0)}
#queue-bar-label{font-size:0.72rem;font-family:'DM Mono',monospace;color:var(--muted)}
#queue-bar-label span{color:var(--gold)}
.btn-sync-now{background:transparent;border:1px solid var(--border);border-radius:7px;padding:6px 14px;color:var(--text);font-family:'DM Mono',monospace;font-size:0.7rem;text-transform:uppercase;letter-spacing:0.07em;cursor:pointer}
.btn-sync-now:hover{border-color:var(--gold);color:var(--gold)}
.btn-sync-dismiss{background:transparent;border:none;color:var(--muted);font-size:0.7rem;cursor:pointer;font-family:'DM Mono',monospace}


/* ── BUY SCORE ── */
.buy-score-wrap{margin-top:6px;display:flex;align-items:center;gap:6px}
.buy-score-bar{flex:1;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.buy-score-fill{height:100%;border-radius:2px;transition:width 0.3s}
.buy-score-val{font-size:0.68rem;font-family:'DM Mono',monospace;font-weight:500;white-space:nowrap;min-width:28px;text-align:right}

/* score colour by value */
.score-low .buy-score-fill{background:#39c88a}
.score-low .buy-score-val{color:#39c88a}
.score-mid .buy-score-fill{background:#c8aa3c}
.score-mid .buy-score-val{color:#c8aa3c}
.score-high .buy-score-fill{background:#e05a2b}
.score-high .buy-score-val{color:#e05a2b}

/* ── VIEW DENSITY TOGGLE ── */
.view-toggle{display:flex;gap:3px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:3px}
.vt-btn{width:28px;height:26px;border:none;background:transparent;color:var(--muted);cursor:pointer;border-radius:5px;display:flex;align-items:center;justify-content:center;transition:all 0.1s}
.vt-btn.active{background:var(--bg3);color:var(--text)}
.vt-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.8}

/* ── GRID DENSITY ── */

/* NORMAL (default): card with image, ~200px min */
.grid.density-normal{grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}

/* WIDE: fewer bigger cards, ~320px min */
.grid.density-wide{grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
.grid.density-wide .card-img-wrap img,.grid.density-wide .card-img-wrap .img-ph{aspect-ratio:2/3}
.grid.density-wide .card-body{padding:12px 14px 14px}

/* LIST: single-column rows, no image, all info in one line */
.grid.density-list{grid-template-columns:1fr;gap:4px}
.grid.density-list .card{border-radius:8px;border-top-width:0 !important;border-left:3px solid transparent}
.grid.density-list .card.sig-hot{border-left-color:var(--hot)}
.grid.density-list .card.sig-warm{border-left-color:var(--warm)}
.grid.density-list .card.sig-buydip{border-left-color:var(--buydip)}
.grid.density-list .card.sig-watch{border-left-color:var(--watch)}
.grid.density-list .card.sig-cold{border-left-color:var(--cold)}
.grid.density-list .card-img-wrap{display:none}
.grid.density-list .card-body{display:flex;align-items:center;gap:12px;padding:8px 12px;flex-wrap:nowrap}
.grid.density-list .card-name{flex:1.8;min-width:0;font-size:0.82rem;margin-bottom:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.grid.density-list .card-set{flex:1;min-width:0;font-size:0.62rem;margin-bottom:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.grid.density-list .card-prices{flex:0 0 auto;flex-direction:column;align-items:flex-end;gap:0;margin-bottom:0;min-width:90px}
.grid.density-list .card-price-chf{font-size:0.82rem}
.grid.density-list .card-price-eur{font-size:0.6rem}
.grid.density-list .card-footer{flex:0 0 auto;gap:8px;margin-bottom:0}
.grid.density-list .buy-score-wrap{flex:0 0 80px;margin-top:0}
.grid.density-list .card-note{display:none}
.grid.density-list .card-mention-btn{top:50%;transform:translateY(-50%);right:6px}
.grid.density-list .card:hover .card-mention-btn{opacity:1}

/* ── NEW CARD MODAL: buy score input ── */
.score-input-wrap{display:flex;align-items:center;gap:10px}
.score-input-wrap input[type=range]{flex:1}
.score-input-wrap .score-readout{font-size:0.82rem;font-family:'DM Mono',monospace;font-weight:500;min-width:30px;color:var(--gold)}
.score-hint{font-size:0.65rem;color:var(--muted);margin-top:4px;font-family:'DM Mono',monospace}

@media(max-width:600px){
  .header,.stats,.quick-add,.controls,.grid{padding-left:16px;padding-right:16px}
  .grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:9px}
  .logo{font-size:2rem}
  .modal-inner{flex-direction:column}
  .modal-img{width:100%;min-width:unset;border-radius:16px 16px 0 0}
  #setup-banner{padding:12px 16px}
}
</style>
</head>
<body>

<!-- SETUP BANNER -->
<div id="setup-banner">
  <span class="setup-label">Apps Script URL</span>
  <input id="url-input" type="text" placeholder="https://script.google.com/macros/s/…/exec" oninput="checkUrlInput()"/>
  <button class="btn-connect" onclick="connectSheet()">Connect</button>
  <div id="sync-status"><div class="sync-dot" id="sync-dot"></div><span id="sync-label">Not connected</span></div>
</div>

<!-- HEADER -->
<div class="header">
  <div>
    <div class="logo">HOLO TRACKER</div>
    <div class="header-meta" id="header-meta">349 cards &nbsp;·&nbsp; 29 May 2026</div>
  </div>
  <div class="portfolio-val">
    <div class="portfolio-val-label">Portfolio value</div>
    <div class="portfolio-val-num" id="portfolio-val">CHF 34,112</div>
  </div>
</div>

<!-- STATS -->
<div class="stats">
  <div class="stat"><div class="stat-label">Total</div><div class="stat-val" id="st-total">349</div></div>

// ── CONSTANTS ──
var SIG_LABELS = {hot:'🔥 Hot',warm:'⚡ Warm',buydip:'🎯 Buy Dip',watch:'👀 Watch',cold:'❄️ Cold'};
var SIG_COLORS = {hot:'var(--hot)',warm:'var(--warm)',buydip:'var(--buydip)',watch:'var(--watch)',cold:'var(--cold)'};
var SHEET_URL = localStorage.getItem('ht_sheet_url') || '';

// ── PENDING MENTION QUEUE ──
// Queue stores {key, name, set, ts} — flushed to Apps Script on sync
var pendingQueue = JSON.parse(localStorage.getItem('ht_pending') || '[]');

// Runtime mention deltas (key -> count) — applied over CARDS data without mutating it
var mentionDeltas = JSON.parse(localStorage.getItem('ht_deltas') || '{}');

function cardKey(c){ return c.n + '|' + c.s; }

function effectiveMentions(c){
  var k = cardKey(c);
  return c.m + (mentionDeltas[k] || 0);
}

// ── SHEET CONNECTION ──
function checkUrlInput(){
  var v = document.getElementById('url-input').value.trim();
  if(v) SHEET_URL = v;
}

function connectSheet(){
  var v = document.getElementById('url-input').value.trim();
  if(!v){ toast('Paste your Apps Script URL first','error'); return; }
  SHEET_URL = v;
  localStorage.setItem('ht_sheet_url', v);
  setSyncStatus('busy','Connecting…');
  fetch(SHEET_URL + '?action=ping').then(r=>r.json()).then(d=>{
    if(d.status==='ok'){
      setSyncStatus('ok','Connected');
      document.getElementById('setup-banner').classList.add('hidden');
      toast('Connected to Google Sheets','success');
    } else {
      setSyncStatus('err','Error');
    }
  }).catch(()=>setSyncStatus('err','Connection failed'));
}

function setSyncStatus(state, label){
  var dot = document.getElementById('sync-dot');
  dot.className = 'sync-dot ' + state;
  document.getElementById('sync-label').textContent = label;
}

// On load: restore URL if saved
(function initSheet(){
  if(SHEET_URL){
    document.getElementById('url-input').value = SHEET_URL;
    document.getElementById('setup-banner').classList.add('hidden');
    setSyncStatus('ok','Saved URL');
  }
})();

// ── TOAST ──
var toastTimer;
function toast(msg, type){
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show ' + (type||'');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>{ el.className=''; }, 2400);
}

// ── MENTION LOGIC ──
function addMention(card, fromCard){
  var k = cardKey(card);
  mentionDeltas[k] = (mentionDeltas[k]||0) + 1;
  localStorage.setItem('ht_deltas', JSON.stringify(mentionDeltas));

  pendingQueue.push({key:k, name:card.n, set:card.s, ts:Date.now()});
  localStorage.setItem('ht_pending', JSON.stringify(pendingQueue));

  updateQueueBar();
  var newCount = effectiveMentions(card);
  toast('✦ ' + card.n + ' → ' + newCount + ' mentions', 'success');

  // Re-render the specific card's mention count in the grid
  var cardEl = document.querySelector('[data-key="' + CSS.escape(k) + '"]');
  if(cardEl){
    var mentionEl = cardEl.querySelector('.mentions');
    if(mentionEl) mentionEl.textContent = newCount + '✦';
    cardEl.classList.remove('pending-sync');
    void cardEl.offsetWidth;
    cardEl.classList.add('pending-sync');

    var btn = cardEl.querySelector('.card-mention-btn');
    if(btn){
      btn.classList.remove('bumped');
      void btn.offsetWidth;
      btn.classList.add('bumped');
    }
  }

  // If called from modal, update modal mention count too
  if(fromCard==='modal'){
    var mRow = document.getElementById('modal-mention-val');
    if(mRow) mRow.textContent = newCount + ' ✦';
  }

  // Auto-sync if connected and queue hits 5
  if(SHEET_URL && pendingQueue.length >= 5) syncQueue();
}

// ── SYNC QUEUE ──
function syncQueue(){
  if(!SHEET_URL){ toast('No Apps Script URL — connect first','error'); return; }
  if(pendingQueue.length === 0){ toast('Nothing to sync'); return; }

  setSyncStatus('busy','Syncing…');
  var payload = {action:'batchMention', mentions: pendingQueue};

  fetch(SHEET_URL, {
    method:'POST',
    body: JSON.stringify(payload)
  }).then(r=>r.json()).then(d=>{
    if(d.status==='ok'){
      // Clear deltas only for synced items
      pendingQueue = [];
      mentionDeltas = {};
      localStorage.setItem('ht_pending','[]');
      localStorage.setItem('ht_deltas','{}');
      updateQueueBar();
      setSyncStatus('ok','Synced');
      toast('Synced to Sheets ✓','success');
    } else {
      setSyncStatus('err','Sync failed');
      toast('Sync failed: ' + (d.error||'unknown'),'error');
    }
  }).catch(()=>{
    setSyncStatus('err','Sync failed');
    toast('Could not reach Apps Script','error');
  });
}

function updateQueueBar(){
  var bar = document.getElementById('queue-bar');
  var ct = document.getElementById('queue-count');
  ct.textContent = pendingQueue.length;
  if(pendingQueue.length > 0) bar.classList.add('show');
  else bar.classList.remove('show');
}

function dismissQueue(){
  document.getElementById('queue-bar').classList.remove('show');
}

updateQueueBar();

// ── QUICK SEARCH (mention bar) ──
var qdFocused = -1;
var qdResults = [];

function quickSearch(q){
  q = q.trim().toLowerCase();
  var dd = document.getElementById('quick-dropdown');
  if(!q){ dd.classList.remove('open'); qdResults=[]; return; }

  qdResults = CARDS.filter(c => c.n.toLowerCase().includes(q) || c.s.toLowerCase().includes(q))
    .slice(0, 8);

  var html = '';
  if(qdResults.length === 0){
    html = '<div class="qd-empty">No match — </div>';
  } else {
    qdResults.forEach((c,i)=>{
      var sig = c.sig||'watch';
      var em = effectiveMentions(c);
      html += `<div class="qd-item" data-i="${i}" onclick="quickMention(${i})">
        <div class="qd-name">${c.n}</div>
        <div class="qd-set">${c.s}</div>
        <span class="qd-badge badge-${sig}" style="background:transparent;padding:0">${SIG_LABELS[sig]||sig}</span>
        <div class="qd-mentions">${em}✦</div>
      </div>`;
    });
  }
  // Always show "Add new card" option
  html += `<div class="qd-new" onclick="openNewModal('${q.replace(/'/g,"\\'")}')">
    <div class="qd-new-label">+ Add "${document.getElementById('quick-input').value.trim()}" as new card</div>
  </div>`;

  dd.innerHTML = html;
  dd.classList.add('open');
  qdFocused = -1;
}

function quickMention(i){
  var card = qdResults[i];
  if(!card) return;
  addMention(card);
  document.getElementById('quick-input').value = '';
  document.getElementById('quick-dropdown').classList.remove('open');
  qdResults = [];
}

function quickKeydown(e){
  var dd = document.getElementById('quick-dropdown');
  var items = dd.querySelectorAll('.qd-item');
  if(e.key==='ArrowDown'){
    qdFocused = Math.min(qdFocused+1, items.length-1);
    items.forEach((el,i)=>el.classList.toggle('focused',i===qdFocused));
    e.preventDefault();
  } else if(e.key==='ArrowUp'){
    qdFocused = Math.max(qdFocused-1, -1);
    items.forEach((el,i)=>el.classList.toggle('focused',i===qdFocused));
    e.preventDefault();
  } else if(e.key==='Enter'){
    if(qdFocused>=0 && qdResults[qdFocused]) quickMention(qdFocused);
    else if(qdResults.length===1) quickMention(0);
    e.preventDefault();
  } else if(e.key==='Escape'){
    dd.classList.remove('open');
  }
}

document.addEventListener('click', function(e){
  if(!e.target.closest('.quick-wrap')) document.getElementById('quick-dropdown').classList.remove('open');
});

    document.getElementById('new-card-modal').classList.remove('open');
}
// ── BUY SCORE ENGINE ──
// Inputs: mentions (0-∞), signal, trajectory ('dip'|'flat'|'climbing'), manualScore (optional override)
// Output: 1.0–10.0  (10 = screaming buy dip, 1 = way too hot)
function calcBuyScore(mentions, signal, trajectory, manualScore) {
  if(manualScore !== undefined && manualScore !== null) return +manualScore;

  // Mentions score: more mentions = more popular = higher demand, but also more expensive
  // We want popular cards that are dipping — so mentions add to base but trajectory modulates
  var mentionScore; // 0–4 pts
  if(mentions >= 8) mentionScore = 4;
  else if(mentions >= 5) mentionScore = 3;
  else if(mentions >= 3) mentionScore = 2;
  else if(mentions >= 2) mentionScore = 1;
  else mentionScore = 0;

  // Trajectory score: dipping is best buying opportunity
  var trajScore = 0; // -3 to +4 pts
  if(trajectory === 'dip') trajScore = 4;
  else if(trajectory === 'flat') trajScore = 1;
  else if(trajectory === 'climbing') trajScore = -3; // too hot, avoid

  // Signal modifier
  var sigScore = 0; // -2 to +2 pts
  if(signal === 'buydip') sigScore = 2;
  else if(signal === 'warm') sigScore = 1;
  else if(signal === 'watch') sigScore = 0;
  else if(signal === 'hot') sigScore = -1;  // climbing = bad entry
  else if(signal === 'cold') sigScore = -2; // dead, no interest

  // Raw score 0-10
  var raw = mentionScore + trajScore + sigScore;
  // Clamp and map to 1.0–10.0
  raw = Math.max(-3, Math.min(10, raw));
  var score = 1 + (raw + 3) * (9/13);
  return Math.round(score * 10) / 10; // 1 decimal
}

// Infer trajectory from notes if not explicitly set
function inferTrajectory(card) {
  var nt = (card.nt || '').toLowerCase();
  if(nt.includes('dip') || nt.includes('support') || nt.includes('floor')) return 'dip';
  if(nt.includes('going down') || nt.includes('falling') || nt.includes('declining')) return 'flat';
  if(nt.includes('climbing') || nt.includes('rising') || nt.includes('hot')) return 'climbing';
  // Infer from signal
  if(card.sig === 'buydip') return 'dip';
  if(card.sig === 'hot') return 'climbing';
  return 'flat';
}

function getBuyScore(card) {
  if(card.bs !== undefined) return card.bs; // stored manual override
  var traj = card.traj || inferTrajectory(card);
  return calcBuyScore(effectiveMentions(card), card.sig, traj);
}

function scoreClass(score) {
  if(score <= 4) return 'score-high';  // bad entry, red
  if(score <= 6.5) return 'score-mid'; // neutral, amber
  return 'score-low';                  // good buy, green
}

function renderScoreBar(score) {
  var cls = scoreClass(score);
  var pct = ((score - 1) / 9 * 100).toFixed(1);
  return '<div class="buy-score-wrap ' + cls + '">' +
    '<div class="buy-score-bar"><div class="buy-score-fill" style="width:' + pct + '%"></div></div>' +
    '<div class="buy-score-val">' + score.toFixed(1) + '</div>' +
  '</div>';
}

// ── VIEW DENSITY ──
var currentDensity = localStorage.getItem('ht_density') || 'normal';
function setDensity(d, btn) {
  // migrate old 'compact' saved preference to 'normal'
  if(d === 'compact') d = 'normal';
  currentDensity = d;
  localStorage.setItem('ht_density', d);
  document.getElementById('grid').className = 'grid density-' + d;
  document.querySelectorAll('.vt-btn').forEach(function(b){ b.classList.remove('active'); });
  if(btn) { btn.classList.add('active'); }
  else { var b = document.getElementById('vt-' + d); if(b) b.classList.add('active'); }
}

// ── ADD NEW CARD ──
function addNewCard(){
  var name = document.getElementById('ncm-name').value.trim();
  var set = document.getElementById('ncm-set').value.trim() || '—';
  var sig = document.getElementById('ncm-sig').value;
  var notes = document.getElementById('ncm-notes').value.trim();
  var traj = document.getElementById('ncm-traj').value;
  var scoreEl = document.getElementById('ncm-score');
  var scoreOverride = scoreEl ? parseFloat(scoreEl.value) : null;
  var priceRaw = document.getElementById('ncm-price').value.trim();
  var marketRaw = document.getElementById('ncm-market').value.trim();
  var price = priceRaw ? 'CHF ' + parseFloat(priceRaw).toFixed(2) : '—';
  var market = marketRaw ? (marketRaw.startsWith('€') ? marketRaw : '€' + marketRaw) : '—';

  if(!name){ toast('Card name required','error'); return; }

  var newCard = {n:name, s:set, m:0, p:price, mk:market, sig:sig, nt:notes, traj:traj, bs:scoreOverride};
  CARDS.unshift(newCard);
  addMention(newCard);
  closeNewModal();
  filterCards();
}

// ── IMAGES ──
var imgCache = {};
var imgFetching = {}; // prevent duplicate in-flight fetches

// ── IMAGE STRATEGY (3 tiers) ──
// Tier 1: Full TCG card ID known (c.tid) → direct /v2/cards/{id} call. Precise, fast.
// Tier 2: Set ID known, no card number (c.si) → search by name+setId. Good hit rate.
// Tier 3: Japanese/unknown set (c.jp===true or no si) → skip, show set-label placeholder.

var TCG_API = 'https://api.pokemontcg.io/v2/cards';

function fetchCardImage(card, img) {
  var k = cardKey(card);
  if (imgCache[k])   { img.src = imgCache[k]; return; }
  if (imgFetching[k]) return; // already in flight

  var cached = sessionStorage.getItem('img_' + k);
  if (cached) { imgCache[k] = cached; img.src = cached; return; }

  // Tier 3: Japanese / unmappable sets — no API, nothing to fetch
  if (card.jp || (!card.si && !card.tid)) return;

  imgFetching[k] = true;

  var url;
  if (card.tid) {
    // Tier 1: direct fetch by full card ID — most precise
    url = TCG_API + '/' + card.tid;
  } else {
    // Tier 2: search by name + set ID
    var name = encodeURIComponent((card.n || '').replace(/'/g, ''));
    url = TCG_API + '?q=name:"' + name + '" set.id:' + card.si + '&pageSize=4';
  }

  fetch(url)
    .then(function(r) { return r.json(); })
    .then(function(d) {
      var imgUrl = null;
      if (card.tid) {
        // Tier 1 response: single card object
        imgUrl = d && d.data && d.data.images && d.data.images.small;
      } else {
        // Tier 2 response: array — pick best match by name similarity
        if (d && d.data && d.data.length) {
          var target = (card.n || '').toLowerCase();
          var best = d.data[0];
          for (var i = 0; i < d.data.length; i++) {
            if ((d.data[i].name || '').toLowerCase() === target) { best = d.data[i]; break; }
          }
          imgUrl = best.images && best.images.small;
        }
      }
      if (imgUrl) {
        imgCache[k] = imgUrl;
        sessionStorage.setItem('img_' + k, imgUrl);
        img.src = imgUrl;
      }
    })
    .catch(function() {})
    .finally(function() { delete imgFetching[k]; });
}

// ── GRID RENDERING ──
var activeTab = 'all';
var grid = document.getElementById('grid');

function parseChf(s){ var n=parseFloat((s||'').replace(/[^0-9.]/g,'')); return isNaN(n)?0:n; }

function getFiltered(){
  var q = document.getElementById('search').value.trim().toLowerCase();
  var sortVal = document.getElementById('sort').value;
  var cards = CARDS.filter(c=>{
    if(activeTab!=='all' && c.sig!==activeTab) return false;
    if(q && !c.n.toLowerCase().includes(q) && !c.s.toLowerCase().includes(q)) return false;
    return true;
  });
  if(sortVal==='mentions') cards.sort((a,b)=>effectiveMentions(b)-effectiveMentions(a));
  else if(sortVal==='price_desc') cards.sort((a,b)=>parseChf(b.p)-parseChf(a.p));
  else if(sortVal==='price_asc') cards.sort((a,b)=>parseChf(a.p)-parseChf(b.p));
  else if(sortVal==='alpha') cards.sort((a,b)=>a.n.localeCompare(b.n));
  return cards;
}

function renderCard(card){
  var sig=card.sig||'watch', k=cardKey(card);
  var div=document.createElement('div');
  div.className='card sig-'+sig;
  div.setAttribute('data-key',k);
  div.onclick=function(e){ if(!e.target.closest('.card-mention-btn')) openDModal(card); };

  // +1 button
  var btn=document.createElement('button');
  btn.className='card-mention-btn';
  btn.title='Add mention';
  btn.textContent='+';
  btn.onclick=function(e){ e.stopPropagation(); addMention(card); };

  var imgWrap=document.createElement('div');
  imgWrap.className='card-img-wrap';
  var ph=document.createElement('div');
  ph.className='img-ph';
  var phIcon = card.jp ? '🇯🇵' : '◆';
  var phLabel = card.jp ? 'JP EXCLUSIVE' : (card.s||'—');
  ph.innerHTML='<div class="img-ph-icon">'+phIcon+'</div><div class="img-ph-txt">'+phLabel+'</div>';
  imgWrap.appendChild(ph);

  var img=document.createElement('img');
  img.style.cssText='width:100%;display:none';
  img.onload=function(){ ph.style.display='none'; img.style.display='block'; };
  imgWrap.appendChild(img);

  // Observe the whole card div (always visible), not imgWrap (hidden in list mode)
  var obs=new IntersectionObserver(function(entries,o){
    entries.forEach(function(e){
      if(e.isIntersecting){
        fetchCardImage(card,img);
        o.unobserve(e.target);
      }
    });
  },{rootMargin:'300px'});
  obs.observe(div); // div = the card element, always in layout

  var em=effectiveMentions(card);
  var score=getBuyScore(card);
  var showScore=(sig==='buydip'||sig==='warm'||sig==='watch');
  var body=document.createElement('div');
  body.className='card-body';
  body.innerHTML=
    '<div class="card-name" title="'+card.n+'">'+card.n+'</div>'+
    '<div class="card-set">'+(card.tid ? card.tid : card.s)+'</div>'+
    '<div class="card-prices">'+
      '<div class="card-price-chf">'+card.p+'</div>'+
      '<div class="card-price-eur">'+card.mk+'</div>'+
    '</div>'+
    '<div class="card-footer">'+
      '<span class="badge badge-'+sig+'">'+(SIG_LABELS[sig]||sig)+'</span>'+
      '<span class="mentions">'+em+'✦</span>'+
    '</div>'+
    (showScore ? renderScoreBar(score) : '')+
    (card.nt?'<div class="card-note">'+card.nt+'</div>':'');

  div.appendChild(btn);
  div.appendChild(imgWrap);
  div.appendChild(body);
  return div;
}

function filterCards(){
  var cards=getFiltered();
  grid.innerHTML='';
  document.getElementById('empty').style.display=cards.length?'none':'block';
  document.getElementById('result-count').textContent=cards.length+' card'+(cards.length!==1?'s':'');
  var frag=document.createDocumentFragment();
  cards.forEach(function(c){ frag.appendChild(renderCard(c)); });
  grid.appendChild(frag);
}

function setTab(btn){
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
  btn.classList.add('active');
  activeTab=btn.dataset.sig;
  filterCards();
}

// ── DETAIL MODAL ──
var modalCard = null;
function openDModal(card){
  modalCard=card;
  var sig=card.sig||'watch', k=cardKey(card);
  var inner=document.getElementById('modal-inner');

  var imgDiv=document.createElement('div');
  imgDiv.className='modal-img';
  var ph2=document.createElement('div');
  ph2.className='img-ph';
  ph2.style.cssText='aspect-ratio:3/4';
  var mPhIcon = card.jp ? '🇯🇵' : '◆';
  var mPhLabel = card.jp ? 'JP EXCLUSIVE' : (card.s||'—');
  ph2.innerHTML='<div class="img-ph-icon">'+mPhIcon+'</div><div class="img-ph-txt">'+mPhLabel+'</div>';
  imgDiv.appendChild(ph2);
  var img2=document.createElement('img');
  img2.style.cssText='width:100%;display:none';
  img2.onload=function(){ ph2.style.display='none'; img2.style.display='block'; };
  imgDiv.appendChild(img2);
  fetchCardImage(card,img2);

  var em=effectiveMentions(card);
  var det=document.createElement('div');
  det.className='modal-details';
  det.innerHTML=
    '<div class="modal-name">'+card.n+'</div>'+
    '<div class="modal-set">'+card.s+(card.tid?' &nbsp;<span style="color:var(--muted);font-size:0.6rem">'+card.tid+'</span>':'')+'&nbsp;·&nbsp; <span style="color:'+SIG_COLORS[sig]+'">'+(SIG_LABELS[sig]||sig)+'</span></div>'+
    '<div class="modal-row"><span class="modal-row-label">Last Price</span><span style="font-weight:600">'+card.p+'</span></div>'+
    '<div class="modal-row"><span class="modal-row-label">Market (EUR)</span><span>'+card.mk+'</span></div>'+
    '<div class="modal-row"><span class="modal-row-label">Mentions</span><span id="modal-mention-val">'+em+' ✦</span></div>'+
    '<div class="modal-row"><span class="modal-row-label">Signal</span><span class="badge badge-'+sig+'">'+(SIG_LABELS[sig]||sig)+'</span></div>'+
    '<div class="modal-row"><span class="modal-row-label">Buy Score</span>'+renderScoreBar(getBuyScore(card))+'</div>'+
    (card.nt?'<div class="modal-row"><span class="modal-row-label">Notes</span><span style="color:var(--muted);font-style:italic">'+card.nt+'</span></div>':'')+
    '<button class="btn-modal-mention" onclick="addMention(modalCard,\'modal\')">+ Add Mention</button>'+
    '<div class="modal-links">'+
      '<a class="modal-link" href="https://www.cardmarket.com/en/Pokemon/Products/Singles?searchString='+encodeURIComponent(card.n)+'" target="_blank">Cardmarket ↗</a>'+
      '<a class="modal-link" href="https://pokemontcg.io" target="_blank">TCG API ↗</a>'+
    '</div>';

  inner.innerHTML='';
  inner.appendChild(imgDiv);
  inner.appendChild(det);
  document.getElementById('modal-bg').classList.add('open');
}
function closeDModal(e){
  if(!e||e.target===document.getElementById('modal-bg')||e.target.classList.contains('modal-close'))
    document.getElementById('modal-bg').classList.remove('open');
}
document.addEventListener('keydown',function(e){ if(e.key==='Escape'){ closeDModal({}); closeNewModal({}); }});

// Apply saved density on load
setDensity(currentDensity, null);

filterCards();
</script>
